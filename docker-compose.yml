services:
  aggregator-back:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aggregator-back
    ports:
      # Port hote 5280 -> port conteneur 8080.
      - "5280:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080

      # SQL Server tourne sur l'hote Windows : depuis un conteneur Linux on cible
      # host.docker.internal. La chaine surcharge celle de appsettings.json
      # (config binding sous forme ConnectionStrings__DefaultConnection).
      ConnectionStrings__DefaultConnection: "Server=host.docker.internal,1433;Database=AggregatorDB;User Id=sa;Password=P@ssw0rd;TrustServerCertificate=true;Encrypt=false;MultipleActiveResultSets=true"

      # bank_connector est deploye sur l'hote (port 5080 par defaut) : depuis le
      # conteneur back on l'atteint par host.docker.internal.
      BankConnector__BaseUrl: "http://host.docker.internal:5080"
    extra_hosts:
      # Assure la resolution de host.docker.internal sur les vieilles versions
      # de Docker Engine Linux (no-op sur Docker Desktop Windows).
      - "host.docker.internal:host-gateway"
    networks:
      - aggregator-net
    restart: unless-stopped

networks:
  aggregator-net:
    driver: bridge
